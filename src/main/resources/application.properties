spring.application.name=duel-tower
server.port=9009

spring.config.import=optional:file:.env[.properties]

spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# mariaDB
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/duel_tower}
spring.datasource.username=${DB_USERNAME:duelTowerUser}
spring.datasource.password=${DB_PASSWORD:}

# jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# logging
logging.file.name=logs/duel-tower.log
logging.level.com.example=DEBUG

logging.level.org.hibernate=INFO
logging.level.org.hibernate.orm.type=INFO
logging.level.org.hibernate.SQL=DEBUG

# console + file pattern (includes request id from MDC: %X{rid})
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] [%X{rid}] [%logger{36}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{rid}] [%logger{36}] - %msg%n

# basic rolling policy
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# 파일 업로드 허용 크기 (향후 업로드 기능 쓸 거면 유지)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# thymeleaf (ui-legacy 쓰는 동안만)
spring.thymeleaf.cache=false
